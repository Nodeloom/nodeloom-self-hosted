apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nodeloom.fullname" . }}-secrets
  labels:
    {{- include "nodeloom.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Security
  APP_ENCRYPTION_KEY: {{ .Values.secrets.appEncryptionKey | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  APP_ADMIN_API_KEY: {{ .Values.secrets.adminApiKey | quote }}

  # License
  NODELOOM_LICENSE_KEY: {{ .Values.secrets.licenseKey | quote }}

  # Initial admin
  ADMIN_EMAIL: {{ .Values.secrets.adminEmail | quote }}
  ADMIN_PASSWORD: {{ .Values.secrets.adminPassword | quote }}

  # Database & Redis
  POSTGRES_PASSWORD: {{ .Values.postgresql.auth.password | quote }}
  REDIS_PASSWORD: {{ .Values.redis.auth.password | quote }}

  # AI Providers
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  GOOGLE_AI_API_KEY: {{ .Values.secrets.googleAiApiKey | quote }}
  AZURE_OPENAI_API_KEY: {{ .Values.secrets.azureOpenaiApiKey | quote }}
  AZURE_OPENAI_ENDPOINT: {{ .Values.secrets.azureOpenaiEndpoint | quote }}

  # OAuth - Google
  GOOGLE_CLIENT_ID: {{ .Values.secrets.googleClientId | quote }}
  GOOGLE_CLIENT_SECRET: {{ .Values.secrets.googleClientSecret | quote }}
  # OAuth - GitHub
  GITHUB_CLIENT_ID: {{ .Values.secrets.githubClientId | quote }}
  GITHUB_CLIENT_SECRET: {{ .Values.secrets.githubClientSecret | quote }}
  # OAuth - Slack
  SLACK_CLIENT_ID: {{ .Values.secrets.slackClientId | quote }}
  SLACK_CLIENT_SECRET: {{ .Values.secrets.slackClientSecret | quote }}
  # OAuth - Microsoft
  MICROSOFT_CLIENT_ID: {{ .Values.secrets.microsoftClientId | quote }}
  MICROSOFT_CLIENT_SECRET: {{ .Values.secrets.microsoftClientSecret | quote }}
  # OAuth - Salesforce
  SALESFORCE_CLIENT_ID: {{ .Values.secrets.salesforceClientId | quote }}
  SALESFORCE_CLIENT_SECRET: {{ .Values.secrets.salesforceClientSecret | quote }}
  # OAuth - HubSpot
  HUBSPOT_CLIENT_ID: {{ .Values.secrets.hubspotClientId | quote }}
  HUBSPOT_CLIENT_SECRET: {{ .Values.secrets.hubspotClientSecret | quote }}
  # OAuth - Shopify
  SHOPIFY_CLIENT_ID: {{ .Values.secrets.shopifyClientId | quote }}
  SHOPIFY_CLIENT_SECRET: {{ .Values.secrets.shopifyClientSecret | quote }}
  # OAuth - Zoom
  ZOOM_CLIENT_ID: {{ .Values.secrets.zoomClientId | quote }}
  ZOOM_CLIENT_SECRET: {{ .Values.secrets.zoomClientSecret | quote }}
  # OAuth - Asana
  ASANA_CLIENT_ID: {{ .Values.secrets.asanaClientId | quote }}
  ASANA_CLIENT_SECRET: {{ .Values.secrets.asanaClientSecret | quote }}
  # OAuth - Linear
  LINEAR_CLIENT_ID: {{ .Values.secrets.linearClientId | quote }}
  LINEAR_CLIENT_SECRET: {{ .Values.secrets.linearClientSecret | quote }}
  # OAuth - Jira
  JIRA_CLIENT_ID: {{ .Values.secrets.jiraClientId | quote }}
  JIRA_CLIENT_SECRET: {{ .Values.secrets.jiraClientSecret | quote }}
  # OAuth - Notion
  NOTION_CLIENT_ID: {{ .Values.secrets.notionClientId | quote }}
  NOTION_CLIENT_SECRET: {{ .Values.secrets.notionClientSecret | quote }}

  # CAPTCHA
  CAPTCHA_SITE_KEY: {{ .Values.secrets.captchaSiteKey | quote }}
  CAPTCHA_SECRET_KEY: {{ .Values.secrets.captchaSecretKey | quote }}

  # Stripe
  STRIPE_SECRET_KEY: {{ .Values.secrets.stripeSecretKey | quote }}
  STRIPE_WEBHOOK_SECRET: {{ .Values.secrets.stripeWebhookSecret | quote }}

  # Axiom
  AXIOM_TOKEN: {{ .Values.secrets.axiomToken | quote }}
