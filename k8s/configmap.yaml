apiVersion: v1
kind: ConfigMap
metadata:
  name: nodeloom-config
  namespace: nodeloom
data:
  # Database
  POSTGRES_DB: "nodeloom"
  POSTGRES_USER: "nodeloom"

  # Spring settings
  SPRING_PROFILES_ACTIVE: "production"
  SERVER_PORT: "8080"

  # Redis
  SPRING_REDIS_HOST: "redis"
  SPRING_REDIS_PORT: "6379"

  # Application settings
  AGENTHERO_SANDBOX_ENABLED: "false"
