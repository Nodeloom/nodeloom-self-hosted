apiVersion: v1
kind: Secret
metadata:
  name: nodeloom-secrets
  namespace: nodeloom
type: Opaque
stringData:
  # REQUIRED: Encryption key for credential storage (AES-256-GCM)
  # Generate with: openssl rand -base64 32
  # CRITICAL: If you change this key, all stored credentials become unreadable!
  APP_ENCRYPTION_KEY: "CHANGE_ME_generate_with_openssl_rand_base64_32"

  # REQUIRED: JWT signing secret (min 256 bits)
  # Generate with: openssl rand -base64 64
  JWT_SECRET: "CHANGE_ME_generate_with_openssl_rand_base64_64"

  # REQUIRED: Admin API key for backoffice communication
  # Generate with: openssl rand -base64 32
  APP_ADMIN_API_KEY: "CHANGE_ME_generate_with_openssl_rand_base64_32"

  # REQUIRED: Database password
  POSTGRES_PASSWORD: "CHANGE_ME_secure_postgres_password"

  # REQUIRED: Redis password
  REDIS_PASSWORD: "CHANGE_ME_secure_redis_password"

  # REQUIRED: License key (obtain from NodeLoom)
  NODELOOM_LICENSE_KEY: "NL-XXXXX-XXXXX-XXXXX-XXXXX"

  # REQUIRED: Initial admin user (first startup only)
  ADMIN_EMAIL: "admin@yourcompany.com"
  ADMIN_PASSWORD: "CHANGE_ME_secure_admin_password"

  # AI Providers (optional)
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  GOOGLE_AI_API_KEY: ""
  AZURE_OPENAI_API_KEY: ""
  AZURE_OPENAI_ENDPOINT: ""

  # OAuth - Google (optional)
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""

  # OAuth - GitHub (optional)
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""

  # OAuth - Slack (optional)
  SLACK_CLIENT_ID: ""
  SLACK_CLIENT_SECRET: ""

  # OAuth - Microsoft (optional)
  MICROSOFT_CLIENT_ID: ""
  MICROSOFT_CLIENT_SECRET: ""

  # OAuth - Salesforce (optional)
  SALESFORCE_CLIENT_ID: ""
  SALESFORCE_CLIENT_SECRET: ""

  # OAuth - HubSpot (optional)
  HUBSPOT_CLIENT_ID: ""
  HUBSPOT_CLIENT_SECRET: ""

  # OAuth - Shopify (optional)
  SHOPIFY_CLIENT_ID: ""
  SHOPIFY_CLIENT_SECRET: ""

  # OAuth - Zoom (optional)
  ZOOM_CLIENT_ID: ""
  ZOOM_CLIENT_SECRET: ""

  # OAuth - Asana (optional)
  ASANA_CLIENT_ID: ""
  ASANA_CLIENT_SECRET: ""

  # OAuth - Linear (optional)
  LINEAR_CLIENT_ID: ""
  LINEAR_CLIENT_SECRET: ""

  # OAuth - Jira (optional)
  JIRA_CLIENT_ID: ""
  JIRA_CLIENT_SECRET: ""

  # OAuth - Notion (optional)
  NOTION_CLIENT_ID: ""
  NOTION_CLIENT_SECRET: ""

  # CAPTCHA (optional)
  CAPTCHA_SITE_KEY: ""
  CAPTCHA_SECRET_KEY: ""

  # Stripe (optional)
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""

  # Axiom logging (optional)
  AXIOM_TOKEN: ""
