apiVersion: v1
kind: Service
metadata:
  name: {{ include "nodeloom.fullname" . }}-backend
  labels:
    {{- include "nodeloom.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  selector:
    {{- include "nodeloom.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  ports:
    - port: 8080
      targetPort: 8080
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nodeloom.fullname" . }}-frontend
  labels:
    {{- include "nodeloom.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  selector:
    {{- include "nodeloom.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  ports:
    - port: 3000
      targetPort: 3000
      name: http
{{- if .Values.postgresql.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nodeloom.fullname" . }}-postgres
  labels:
    {{- include "nodeloom.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  selector:
    {{- include "nodeloom.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
{{- end }}
{{- if .Values.redis.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nodeloom.fullname" . }}-redis
  labels:
    {{- include "nodeloom.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  selector:
    {{- include "nodeloom.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
  ports:
    - port: 6379
      targetPort: 6379
{{- end }}
