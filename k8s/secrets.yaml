apiVersion: v1
kind: Secret
metadata:
  name: agenthero-secrets
  namespace: agenthero
type: Opaque
stringData:
  # REQUIRED: Generate with: openssl rand -base64 64
  JWT_SECRET: "CHANGE_ME_generate_with_openssl_rand_base64_64"

  # REQUIRED: Database password
  POSTGRES_PASSWORD: "CHANGE_ME_secure_postgres_password"

  # REQUIRED: Redis password
  REDIS_PASSWORD: "CHANGE_ME_secure_redis_password"

  # AI Providers (optional)
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  GOOGLE_AI_API_KEY: ""
  AZURE_OPENAI_API_KEY: ""
  AZURE_OPENAI_ENDPOINT: ""

  # OAuth (optional)
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""
  SLACK_CLIENT_ID: ""
  SLACK_CLIENT_SECRET: ""

  # Stripe (optional)
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
