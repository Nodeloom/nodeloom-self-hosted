# Default values for NodeLoom
# This is a YAML-formatted file.

# Global settings
global:
  imageRegistry: ghcr.io/nodeloom
  imagePullSecrets: []

# Backend configuration
backend:
  replicaCount: 2
  image:
    repository: nodeloom-backend
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilization: 70
    targetMemoryUtilization: 80

# Frontend configuration
frontend:
  replicaCount: 2
  image:
    repository: nodeloom-frontend
    tag: self-hosted
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# PostgreSQL configuration
postgresql:
  enabled: true
  image: pgvector/pgvector:pg16
  auth:
    database: nodeloom
    username: nodeloom
    # Set via --set postgresql.auth.password=xxx
    password: ""
  persistence:
    enabled: true
    size: 50Gi
    storageClass: ""  # Use default storage class
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

# Redis configuration
redis:
  enabled: true
  image: redis:7-alpine
  auth:
    # Set via --set redis.auth.password=xxx
    password: ""
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

# Ingress configuration
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
  hosts:
    - host: app.yourdomain.com
      paths:
        - path: /
          service: frontend
    - host: api.yourdomain.com
      paths:
        - path: /
          service: backend
  tls: []
  #  - secretName: nodeloom-tls
  #    hosts:
  #      - app.yourdomain.com
  #      - api.yourdomain.com

# Secrets - REQUIRED: Set these values!
secrets:
  # REQUIRED: Encryption key for credential storage (AES-256-GCM)
  # Generate with: openssl rand -base64 32
  appEncryptionKey: ""
  # REQUIRED: JWT signing secret (min 256 bits)
  # Generate with: openssl rand -base64 64
  jwtSecret: ""
  # REQUIRED: Admin API key for backoffice communication
  # Generate with: openssl rand -base64 32
  adminApiKey: ""
  # REQUIRED: License key (obtain from NodeLoom)
  licenseKey: ""
  # REQUIRED: Initial admin credentials (first startup only)
  adminEmail: "admin@yourcompany.com"
  adminPassword: ""

  # AI Provider API keys (optional)
  openaiApiKey: ""
  anthropicApiKey: ""
  googleAiApiKey: ""
  azureOpenaiApiKey: ""
  azureOpenaiEndpoint: ""

  # OAuth credentials (optional)
  googleClientId: ""
  googleClientSecret: ""
  githubClientId: ""
  githubClientSecret: ""
  slackClientId: ""
  slackClientSecret: ""
  microsoftClientId: ""
  microsoftClientSecret: ""
  salesforceClientId: ""
  salesforceClientSecret: ""
  hubspotClientId: ""
  hubspotClientSecret: ""
  shopifyClientId: ""
  shopifyClientSecret: ""
  zoomClientId: ""
  zoomClientSecret: ""
  asanaClientId: ""
  asanaClientSecret: ""
  linearClientId: ""
  linearClientSecret: ""
  jiraClientId: ""
  jiraClientSecret: ""
  notionClientId: ""
  notionClientSecret: ""

  # CAPTCHA (optional)
  captchaSiteKey: ""
  captchaSecretKey: ""

  # Stripe (optional)
  stripeSecretKey: ""
  stripeWebhookSecret: ""

  # Axiom logging (optional)
  axiomToken: ""

# Application configuration
config:
  # Application URLs (REQUIRED - change to your actual domains)
  appBaseUrl: "https://api.yourdomain.com"
  appFrontendUrl: "https://app.yourdomain.com"
  corsAllowedOrigins: "https://app.yourdomain.com"

  # Proxy (NATIVE when behind ingress/LB)
  forwardHeadersStrategy: "NATIVE"

  # Self-hosted mode
  deploymentMode: "SELF_HOSTED"
  licenseValidationEnabled: "true"
  licenseValidationUrl: "https://backoffice.nodeloom.io/api/licenses/validate"
  licenseCacheTtlHours: "24"
  licenseRevalidationIntervalHours: "6"
  licenseGracePeriodHours: "72"
  licenseValidationTimeoutSeconds: "30"

  # Features
  captchaEnabled: "false"
  captchaVerifyUrl: "https://challenges.cloudflare.com/turnstile/v0/siteverify"
  stripeEnabled: "false"
  sandboxEnabled: "false"
  sandboxPullImages: "true"
  scimRateLimitEnabled: "true"
  scimRateLimitPerMinute: "60"

  # Connection pool
  hikariMaxPoolSize: "20"
  hikariMinIdle: "5"

  # Logging
  logLevelApp: "INFO"
  logLevelSecurity: "WARN"
  logLevelWeb: "WARN"
  logLevelSql: "WARN"
  axiomDataset: "nodeloom-production"

# Service account
serviceAccount:
  create: true
  name: nodeloom
  annotations: {}

# Pod security context
podSecurityContext:
  fsGroup: 1000

# Container security context
securityContext:
  runAsNonRoot: true
  runAsUser: 1000

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}
