apiVersion: v1
kind: ConfigMap
metadata:
  name: nodeloom-config
  namespace: nodeloom
data:
  # Database
  POSTGRES_DB: "nodeloom"
  POSTGRES_USER: "nodeloom"

  # Spring settings
  SPRING_PROFILES_ACTIVE: "production"
  SERVER_PORT: "8080"

  # Redis
  SPRING_REDIS_HOST: "redis"
  SPRING_REDIS_PORT: "6379"

  # Self-hosted mode
  DEPLOYMENT_MODE: "SELF_HOSTED"
  LICENSE_VALIDATION_ENABLED: "true"

  # Application URLs (change to your actual domains)
  APP_BASE_URL: "https://api.yourdomain.com"
  APP_FRONTEND_URL: "https://app.yourdomain.com"
  APP_CORS_ALLOWED_ORIGINS: "https://app.yourdomain.com"

  # Proxy (NATIVE when behind ingress controller / load balancer)
  FORWARD_HEADERS_STRATEGY: "NATIVE"

  # Sandbox
  SANDBOX_ENABLED: "false"
  SANDBOX_PULL_IMAGES: "true"

  # CAPTCHA
  CAPTCHA_ENABLED: "false"
  CAPTCHA_VERIFY_URL: "https://challenges.cloudflare.com/turnstile/v0/siteverify"

  # Stripe
  STRIPE_ENABLED: "false"

  # SCIM rate limiting
  SCIM_RATE_LIMIT_ENABLED: "true"
  SCIM_RATE_LIMIT_PER_MINUTE: "60"

  # Connection pool
  HIKARI_MAX_POOL_SIZE: "20"
  HIKARI_MIN_IDLE: "5"

  # Logging
  LOG_LEVEL_APP: "INFO"
  LOG_LEVEL_SECURITY: "WARN"
  LOG_LEVEL_WEB: "WARN"
  LOG_LEVEL_SQL: "WARN"
  AXIOM_DATASET: "nodeloom-production"

  # License settings
  LICENSE_VALIDATION_URL: "https://backoffice.nodeloom.io/api/licenses/validate"
  LICENSE_CACHE_TTL_HOURS: "24"
  LICENSE_REVALIDATION_INTERVAL_HOURS: "6"
  LICENSE_GRACE_PERIOD_HOURS: "72"
  LICENSE_VALIDATION_TIMEOUT_SECONDS: "30"
