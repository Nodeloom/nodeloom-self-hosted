apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: agenthero
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: agenthero
      containers:
        - name: backend
          image: ghcr.io/reedzerrad/agenthero-backend:latest
          ports:
            - containerPort: 8080
          env:
            # Database
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/agenthero
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: agenthero-config
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agenthero-secrets
                  key: POSTGRES_PASSWORD
            # Redis
            - name: SPRING_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: agenthero-config
                  key: SPRING_REDIS_HOST
            - name: SPRING_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: agenthero-config
                  key: SPRING_REDIS_PORT
            - name: SPRING_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agenthero-secrets
                  key: REDIS_PASSWORD
            # Security
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: agenthero-secrets
                  key: JWT_SECRET
            # AI Providers
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agenthero-secrets
                  key: OPENAI_API_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agenthero-secrets
                  key: ANTHROPIC_API_KEY
            - name: GOOGLE_AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agenthero-secrets
                  key: GOOGLE_AI_API_KEY
            # OAuth
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: agenthero-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: agenthero-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: agenthero-secrets
                  key: GITHUB_CLIENT_ID
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: agenthero-secrets
                  key: GITHUB_CLIENT_SECRET
            # Spring
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: agenthero-config
                  key: SPRING_PROFILES_ACTIVE
            - name: SERVER_PORT
              value: "8080"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: agenthero
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: agenthero
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agenthero
  namespace: agenthero
